<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak DeezPair Living</title>
    <style>
        body {
            font-family: Montserrat, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            text-align: justify;
        }
    </style>
</head>
<body>
    <h1>Kontak DeezPair Living</h1>
    <figure>
        <img src="DEEZPAIR.png" alt="DeezPair Living Logo" width="520" height="250">
        <figcaption>DeezPair Living: Your UNsmart Home Solution</figcaption>
    </figure>
    <p>Jika Anda memiliki pertanyaan atau membutuhkan bantuan, jangan ragu untuk menghubungi kami, karena kami akan membuat keraguan anda menjadi nyata!</p>
    <form action="">
        <div style="margin-bottom: 15px;">
            <label for="Nama">Name:</label><br>
            <input type="text" id="Nama" name="Nama" style="width: 100%; padding: 8px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
            <label for="Email">Email:</label><br>
            <input type="email" id="Email" name="Email" style="width: 100%; padding: 8px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;"></div>
            <label for="Bank Details">Bank Details:</label><br>
            <textarea id="Bank Details" name="Bank Details" style="width: 100%; padding: 8px; box-sizing: border-box;"></textarea>
        </div>
        <div style="margin-bottom: 15px;">
            <label for="PIN">Personal Identification Number:</label><br>
            <input type="text" id="PIN" name="PIN" style="width: 100%; padding: 8px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
            <label for="Product Interest">Product Interest:</label><br>
            <select id="Product Interest" name="Product Interest" style="width: 100%; padding: 8px; box-sizing: border-box;">
                <option value="">Select a product...</option>
                <option value="CCTV">CCTV</option>
                <option value="Smart Lock">Smart Lock</option>
                <option value="Smart Lighting">Smart Lighting</option>
                <option value="Smart Thermostat">Yo Mama</option>
                <option value="Smart Security System">Kashtan M1</option>
            </select>
        </div>
        <div style="margin-bottom: 15px;">
            <label for="Lastmsg">Any Last Message Before You Know Our Response?:</label><br>
            <textarea id="Lastmsg" name="Lastmsg" style="width: 100%; padding: 8px; box-sizing: border-box;"></textarea>
        </div>
        <br>
        <input type="submit" value="Submit" style="padding: 10px 20px; background-color: #2c3e50; color: white; border: none; cursor: pointer;">
    </form>
</body>

</html>
